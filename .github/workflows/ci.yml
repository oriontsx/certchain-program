name: CI

on:
  push:
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]

# cancel an in-progress run when a newer commit is pushed to the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: "3.1.12"
  ANCHOR_VERSION: "0.31.1"

jobs:
  lint:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  build-and-test:
    name: anchor build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-anchor${{ env.ANCHOR_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-anchor${{ env.ANCHOR_VERSION }}-

      # Pin Agave 3.1.12 — the toolchain this program is developed against. Its
      # build-sbf cargo is recent enough to parse the edition-2024 dependency
      # manifests in Cargo.lock (crypto-common 0.2.x, etc.) that older Agave
      # (2.1.x) chokes on. Agave 3.x needs io_uring, which ubuntu-latest provides.
      - name: Install Solana (Agave) CLI v${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Show Solana version
        run: solana --version

      - name: Generate a CI keypair (used as the provider wallet)
        run: solana-keygen new --no-bip39-passphrase --force --silent -o "$HOME/.config/solana/id.json"

      - name: Cache Anchor (AVM) toolchain
        uses: actions/cache@v4
        with:
          path: ~/.avm
          key: ${{ runner.os }}-avm-${{ env.ANCHOR_VERSION }}

      - name: Install AVM & Anchor v${{ env.ANCHOR_VERSION }}
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}

      - name: Show Anchor version
        run: anchor --version

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Anchor build
        run: anchor build

      # Override the Anchor.toml devnet default: CI must run against a local
      # validator (anchor spins one up and funds the wallet), not real devnet.
      - name: Anchor test
        run: anchor test --skip-build --provider.cluster localnet
