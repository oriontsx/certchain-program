<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CertChain — Verify a credential</title>
    <style>
      :root {
        --bg: #0f0a24;
        --panel: #1a1140;
        --ink: #ece9ff;
        --muted: #9a8fc7;
        --teal: #2dd4bf;
        --indigo: #7c6cff;
        --bad: #ff6b6b;
        --line: rgba(255, 255, 255, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1200px 600px at 70% -10%, #241653 0%, var(--bg) 60%);
        color: var(--ink);
        font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 640px;
        background: linear-gradient(180deg, rgba(124, 108, 255, 0.06), transparent), var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }
      h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: 0.2px; }
      h1 span { color: var(--teal); }
      p.sub { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
      label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
      .row { display: flex; gap: 10px; }
      input {
        flex: 1;
        background: #120c2e;
        border: 1px solid var(--line);
        color: var(--ink);
        border-radius: 10px;
        padding: 12px 14px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        outline: none;
      }
      input:focus { border-color: var(--indigo); }
      button {
        background: linear-gradient(180deg, var(--indigo), #5b4bd6);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 12px 18px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .net { margin-top: 10px; font-size: 12px; color: var(--muted); }
      .net select { background: #120c2e; color: var(--ink); border: 1px solid var(--line); border-radius: 6px; padding: 2px 6px; }
      #result { margin-top: 22px; }
      .status { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; }
      .status.ok { color: var(--teal); }
      .status.bad { color: var(--bad); }
      .status.muted { color: var(--muted); font-weight: 500; font-size: 15px; }
      .fields { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 14px; }
      .field { display: grid; grid-template-columns: 130px 1fr; gap: 8px; padding: 4px 0; font-size: 14px; }
      .field .k { color: var(--muted); }
      .field .v { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
      footer { margin-top: 22px; font-size: 12px; color: var(--muted); }
      footer code { color: var(--indigo); }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Cert<span>Chain</span> · verify</h1>
      <p class="sub">Paste a credential's 32-byte SHA-256 hash (the QR payload). It resolves the on-chain PDA and shows the stored record.</p>

      <label for="hash">Credential hash (64 hex chars)</label>
      <div class="row">
        <input id="hash" placeholder="e.g. 24fc33c70ad3df55…" spellcheck="false" />
        <button id="go">Verify</button>
      </div>
      <div class="net">
        Network:
        <select id="net">
          <option value="https://api.devnet.solana.com" selected>devnet</option>
          <option value="https://api.mainnet-beta.solana.com">mainnet-beta</option>
          <option value="http://127.0.0.1:8899">localnet</option>
        </select>
      </div>

      <div id="result"></div>

      <footer>
        Program <code>4QFVyA8txKQM6rYsiDBJ4QrNurYtouaJq69KCfWXvKgV</code> · PDA seeds <code>["credential", hash]</code>.
        Read-only; nothing is signed.
      </footer>
    </main>

    <script type="module">
      import { Connection, PublicKey } from "https://esm.sh/@solana/web3.js@1.95.3";

      const PROGRAM_ID = new PublicKey("4QFVyA8txKQM6rYsiDBJ4QrNurYtouaJq69KCfWXvKgV");
      const $ = (id) => document.getElementById(id);
      const result = $("result");
      const esc = (s) =>
        String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

      function hexToBytes(hex) {
        const clean = hex.trim().replace(/^0x/, "").toLowerCase();
        if (!/^[0-9a-f]{64}$/.test(clean)) throw new Error("hash must be 64 hex characters (32 bytes)");
        const out = new Uint8Array(32);
        for (let i = 0; i < 32; i++) out[i] = parseInt(clean.slice(i * 2, i * 2 + 2), 16);
        return out;
      }

      // Borsh-decode the Credential account (layout mirrors programs/certchain/src/lib.rs).
      function decodeCredential(raw) {
        const data = new Uint8Array(raw);
        const dv = new DataView(data.buffer, data.byteOffset, data.byteLength);
        let o = 8; // skip the 8-byte Anchor discriminator
        const pubkey = () => { const k = new PublicKey(data.slice(o, o + 32)); o += 32; return k.toBase58(); };
        const str = () => { const n = dv.getUint32(o, true); o += 4; const s = new TextDecoder().decode(data.slice(o, o + n)); o += n; return s; };
        const institution = pubkey();
        const student = pubkey();
        const studentName = str();
        const degree = str();
        const department = str();
        const year = dv.getUint16(o, true); o += 2;
        const grade = str();
        const credentialHash = [...data.slice(o, o + 32)].map((b) => b.toString(16).padStart(2, "0")).join(""); o += 32;
        const issuedAt = Number(dv.getBigInt64(o, true)); o += 8;
        return { institution, student, studentName, degree, department, year, grade, credentialHash, issuedAt };
      }

      function render(state, payload) {
        if (state === "checking") {
          result.innerHTML = `<div class="status muted">Resolving on-chain…</div>`;
          return;
        }
        if (state === "notfound") {
          result.innerHTML = `<div class="status bad">✗ Not verified</div><div class="net">No credential exists on-chain for that hash.</div>`;
          return;
        }
        if (state === "error") {
          result.innerHTML = `<div class="status bad">⚠ ${esc(payload)}</div>`;
          return;
        }
        const c = payload;
        const row = (k, v) => `<div class="field"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`;
        result.innerHTML =
          `<div class="status ok">✓ Verified</div>` +
          `<div class="fields">` +
          row("Student", c.studentName) +
          row("Degree", c.degree) +
          row("Department", c.department) +
          row("Year", c.year) +
          row("Grade", c.grade) +
          row("Student wallet", c.student) +
          row("Institution", c.institution) +
          row("Issued", new Date(c.issuedAt * 1000).toISOString()) +
          `</div>`;
      }

      async function verify() {
        try {
          const hash = hexToBytes($("hash").value);
          render("checking");
          const [pda] = PublicKey.findProgramAddressSync([new TextEncoder().encode("credential"), hash], PROGRAM_ID);
          const conn = new Connection($("net").value, "confirmed");
          const info = await conn.getAccountInfo(pda);
          if (!info) return render("notfound");
          render("ok", decodeCredential(info.data));
        } catch (e) {
          render("error", e.message || String(e));
        }
      }

      $("go").addEventListener("click", verify);
      $("hash").addEventListener("keydown", (e) => { if (e.key === "Enter") verify(); });

      // auto-verify when opened with a ?hash= query param (QR codes / shareable links)
      const preset = new URLSearchParams(location.search).get("hash");
      if (preset) { $("hash").value = preset; verify(); }
    </script>
  </body>
</html>
